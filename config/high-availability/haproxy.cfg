global
    log /dev/log local0
    log /dev/log local1 notice
    chroot /var/lib/haproxy
    stats socket /run/haproxy/admin.sock mode 660 level admin expose-fd listeners
    stats timeout 30s
    user haproxy
    group haproxy
    daemon

defaults
    log     global
    mode    tcp
    option  tcplog
    option  dontlognull
    timeout connect 5000
    timeout client  50000
    timeout server  50000
    errorfile 400 /etc/haproxy/errors/400.http
    errorfile 403 /etc/haproxy/errors/403.http
    errorfile 408 /etc/haproxy/errors/408.http
    errorfile 500 /etc/haproxy/errors/500.http
    errorfile 502 /etc/haproxy/errors/502.http
    errorfile 503 /etc/haproxy/errors/503.http
    errorfile 504 /etc/haproxy/errors/504.http

# Read-write mode (master)
listen postgres_rw
    bind *:5000
    mode tcp
    balance leastconn
    option httpchk GET /master
    default-server inter 3s fall 3 rise 2 on-marked-down shutdown-sessions
    server patroni0 patroni0:5432 check port 8008
    server patroni1 patroni1:5432 check port 8008 backup
    server patroni2 patroni2:5432 check port 8008 backup

# Read-only mode (replicas)
listen postgres_ro
    bind *:5001
    mode tcp
    balance roundrobin
    option httpchk GET /replica
    default-server inter 3s fall 3 rise 2 on-marked-down shutdown-sessions
    server patroni0 patroni0:5432 check port 8008
    server patroni1 patroni1:5432 check port 8008
    server patroni2 patroni2:5432 check port 8008

# Stats endpoint
listen stats
    bind *:7000
    mode http
    stats enable
    stats hide-version
    stats realm Haproxy\ Statistics
    stats uri /
