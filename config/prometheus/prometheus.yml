global:
  # How often to scrape targets by default
  scrape_interval: 15s
  # Timeout for scrapes
  scrape_timeout: 10s
  # How frequently to evaluate rules
  evaluation_interval: 1m

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

# Load rules once and periodically evaluate them according to the global 'evaluation_interval'.
rule_files:
  - 'alert.rules'
  # - 'first_rules.yml'
  # - 'second_rules.yml'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'docker'
    static_configs:
      - targets: ['docker:9323']

  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'traefik'
    static_configs:
      - targets: ['traefik:8080']

  - job_name: 'gitlab'
    metrics_path: '/-/metrics'
    scheme: http  # Changed from https to http for local development
    static_configs:
      - targets: ['gitlab:80']

  - job_name: 'sonarqube'
    metrics_path: '/sonarqube/prometheus'
    static_configs:
      - targets: ['sonarqube:9000']
