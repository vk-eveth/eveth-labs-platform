version: '3.8'

services:
  web:
    image: ${CI_REGISTRY_IMAGE}:${CI_COMMIT_TAG:-latest}
    container_name: ${APP_NAME}-prod
    restart: unless-stopped
    deploy:
      replicas: 3
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${APP_NAME}_prod
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - LOG_LEVEL=info
    secrets:
      - db_password
      - redis_password
    configs:
      - source: app-config
        target: /app/config/production.json
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - app-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${APP_NAME}-prod.rule=Host(`${DOMAIN}`) && PathPrefix(`/`)"
      - "traefik.http.routers.${APP_NAME}-prod.entrypoints=web"
      - "traefik.http.services.${APP_NAME}-prod.loadbalancer.server.port=3000"
      - "traefik.http.services.${APP_NAME}-prod.loadbalancer.sticky.cookie.name=sticky"
      - "traefik.http.middlewares.${APP_NAME}-ratelimit.ratelimit.average=100"
      - "traefik.http.middlewares.${APP_NAME}-ratelimit.ratelimit.burst=50"
      - "traefik.http.routers.${APP_NAME}-prod.middlewares=${APP_NAME}-ratelimit@docker"

  db:
    image: postgres:15-alpine
    container_name: ${APP_NAME}-db-prod
    deploy:
      placement:
        constraints: [node.role == manager]
    environment:
      - POSTGRES_DB=${APP_NAME}_prod
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD_FILE=/run/secrets/db_password
    secrets:
      - db_password
    volumes:
      - ${APP_NAME}_db_data_prod:/var/lib/postgresql/data
      - ${APP_NAME}_db_backups:/backups
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${APP_NAME}_prod"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: ${APP_NAME}-redis-prod
    command: redis-server --requirepass ${REDIS_PASSWORD}
    secrets:
      - redis_password
    volumes:
      - ${APP_NAME}_redis_data_prod:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  app-network:
    driver: overlay
    attachable: true

volumes:
  ${APP_NAME}_db_data_prod:
    driver: local
  ${APP_NAME}_db_backups:
    driver: local
  ${APP_NAME}_redis_data_prod:
    driver: local

secrets:
  db_password:
    external: true
  redis_password:
    external: true

configs:
  app-config:
    file: ./config/production.json
