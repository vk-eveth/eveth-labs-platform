# Example GitLab CI/CD Pipeline

stages:
  - test
  - build
  - sonarqube-check
  - deploy
  - monitor

variables:
  DOCKER_HOST: tcp://docker:2375/
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""
  PROJECT_NAME: example-app
  VERSION: ${CI_COMMIT_SHORT_SHA}
  REGISTRY_HOST: harbor.${DOMAIN}
  REGISTRY_NAMESPACE: library
  CONTAINER_REGISTRY: ${REGISTRY_HOST}/${REGISTRY_NAMESPACE}
  SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
  GIT_DEPTH: 0

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .m2/repository
    - target/
    - node_modules/

services:
  - name: docker:20.10.16-dind
    command: ["--tls=false", "--insecure-registry=harbor.evethlabstech"]

# Jobs
install_dependencies:
  stage: test
  image: maven:3.8.6-jdk-11
  script:
    - mvn dependency:go-offline
  only:
    - merge_requests
    - main
    - develop

unit_tests:
  stage: test
  image: maven:3.8.6-jdk-11
  script:
    - mvn test
  artifacts:
    reports:
      junit: 
        - target/surefire-reports/*.xml
  only:
    - merge_requests
    - main
    - develop

build_application:
  stage: build
  image: maven:3.8.6-jdk-11
  script:
    - mvn clean package -DskipTests
  artifacts:
    paths:
      - target/*.jar
  only:
    - merge_requests
    - main
    - develop

build_docker_image:
  stage: build
  image: docker:20.10.16
  variables:
    DOCKER_BUILDKIT: 1
  script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login --username $CI_REGISTRY_USER --password-stdin $REGISTRY_HOST
    - docker build -t $CONTAINER_REGISTRY/$PROJECT_NAME:$VERSION .
    - docker push $CONTAINER_REGISTRY/$PROJECT_NAME:$VERSION
    - docker tag $CONTAINER_REGISTRY/$PROJECT_NAME:$VERSION $CONTAINER_REGISTRY/$PROJECT_NAME:latest
    - docker push $CONTAINER_REGISTRY/$PROJECT_NAME:latest
  dependencies:
    - build_application
  only:
    - main
    - develop
    - tags

sonarqube-check:
  stage: sonarqube-check
  image: sonarsource/sonar-scanner-cli:latest
  variables:
    SONAR_HOST_URL: http://sonar.evethlabstech
  cache:
    key: "${CI_JOB_NAME}"
    paths:
      - .sonar/cache
  script:
    - sonar-scanner
      -Dsonar.qualitygate.wait=true
      -Dsonar.projectKey=${CI_PROJECT_NAME}
      -Dsonar.projectName=${CI_PROJECT_NAME}
      -Dsonar.projectVersion=${CI_COMMIT_SHORT_SHA}
      -Dsonar.sources=.
      -Dsonar.java.binaries=target/classes
      -Dsonar.java.libraries=target/**/*.jar
      -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
      -Dsonar.host.url=${SONAR_HOST_URL}
      -Dsonar.login=${SONAR_TOKEN}
  allow_failure: true
  only:
    - merge_requests
    - main
    - develop

deploy_development:
  stage: deploy
  image: alpine:3.16
  variables:
    ENVIRONMENT: development
  script:
    - apk add --no-cache curl
    - |
      curl -X POST \
        -H "Content-Type: application/json" \
        -H "PRIVATE-TOKEN: $GITLAB_API_TOKEN" \
        -d '{"token": "'$DEPLOY_TOKEN'", "ref": "'$CI_COMMIT_REF_NAME'"}' \
        "http://gitlab.evethlabstech/api/v4/projects/$CI_PROJECT_ID/trigger/pipeline"
  environment:
    name: development
    url: https://dev.example.com
  only:
    - develop

deploy_production:
  stage: deploy
  image: alpine:3.16
  variables:
    ENVIRONMENT: production
  script:
    - apk add --no-cache curl
    - |
      curl -X POST \
        -H "Content-Type: application/json" \
        -H "PRIVATE-TOKEN: $GITLAB_API_TOKEN" \
        -d '{"token": "'$DEPLOY_TOKEN'", "ref": "'$CI_COMMIT_REF_NAME'"}' \
        "http://gitlab.evethlabstech/api/v4/projects/$CI_PROJECT_ID/trigger/pipeline"
  environment:
    name: production
    url: https://example.com
  when: manual
  only:
    - main

monitor_health:
  stage: monitor
  image: alpine:3.16
  script:
    - apk add --no-cache curl
    - |
      response=$(curl -s -o /dev/null -w "%{http_code}" https://${ENVIRONMENT}.example.com/health)
      if [ "$response" != "200" ]; then
        echo "Health check failed with status $response"
        exit 1
      fi
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: always
    - if: $CI_PIPELINE_SOURCE == "push"
      when: on_success
